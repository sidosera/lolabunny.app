name: Build Release Artifacts

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Swift package
        run: swift test --disable-swift-testing --scratch-path .build/swiftpm/tests

      - name: Build SwiftPM products
        run: |
          swift build --scratch-path .build/swiftpm/products --product lolabunny-macos-app
          swift build --scratch-path .build/swiftpm/products --product lolabunny-server

  build-server:
    name: Build Server (${{ matrix.arch }})
    runs-on: macos-15
    needs: test
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: arm64
            swift_triple: arm64-apple-macos13.0
          - arch: x86_64
            swift_triple: x86_64-apple-macos13.0
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [[ -n "$exact_tag" && "$exact_tag" != *+* ]]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            latest_tag="${latest_tag%%+*}"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Build server binary
        run: |
          swift build \
            --scratch-path .build/swiftpm/lolabunny-server-${{ matrix.arch }} \
            --configuration release \
            --product lolabunny-server \
            --triple ${{ matrix.swift_triple }}

      - name: Package binary
        run: |
          rm -rf package-root
          mkdir -p package-root
          bin_dir="$(swift build \
            --scratch-path .build/swiftpm/lolabunny-server-${{ matrix.arch }} \
            --configuration release \
            --product lolabunny-server \
            --triple ${{ matrix.swift_triple }} \
            --show-bin-path)"
          cp "$bin_dir/lolabunny-server" package-root/lolabunny-server
          (cd package-root && shasum -a 256 lolabunny-server > lolabunny-server.sha256)
          cp .version package-root/.version
          files=(lolabunny-server lolabunny-server.sha256 .version)
          if [ -d lola-core ]; then
            cp -R lola-core package-root/
            files+=(lola-core)
          fi
          versioned_archive="lolabunny-server@${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz"
          tar czf "${versioned_archive}" -C package-root "${files[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolabunny-server@${{ env.VERSION }}-darwin-${{ matrix.arch }}
          path: lolabunny-server@${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: lolabunny-server@${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-app:
    name: Build macOS App
    runs-on: macos-15
    needs: test
    permissions:
      contents: write
    env:
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [[ -n "$exact_tag" && "$exact_tag" != *+* ]]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            latest_tag="${latest_tag%%+*}"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != '' && env.MACOS_CERTIFICATE_PWD != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build app bundle and DMG
        run: bash scripts/build-release-macos-app.sh

      - name: Notarize and staple macOS app
        if: env.APPLE_ID != ''
        uses: love-actions/xcode-notarizer@v1
        with:
          product-path: .build/lolabunny-macos-app-release/bundle/Lolabunny.app
          apple-id: ${{ secrets.APPLE_ID }}
          app-password: ${{ secrets.APPLE_ID_PWD }}
          team-id: ${{ secrets.APPLE_TEAM_ID }}
          staple: true

      - name: Rebuild DMG after stapling
        if: env.APPLE_ID != ''
        run: |
          rm -rf .build/lolabunny-macos-app-release/dmg-staging .build/lolabunny-macos-app-release/lolabunny-macos-app@${{ env.VERSION }}.dmg
          mkdir -p .build/lolabunny-macos-app-release/dmg-staging
          cp -R ".build/lolabunny-macos-app-release/bundle/Lolabunny.app" ".build/lolabunny-macos-app-release/dmg-staging/Lolabunny.app"
          ln -s /Applications .build/lolabunny-macos-app-release/dmg-staging/Applications
          hdiutil create -volname "Lolabunny" -srcfolder .build/lolabunny-macos-app-release/dmg-staging -ov -format UDZO .build/lolabunny-macos-app-release/lolabunny-macos-app@${{ env.VERSION }}.dmg
          rm -rf .build/lolabunny-macos-app-release/dmg-staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolabunny-macos-app@${{ env.VERSION }}
          path: .build/lolabunny-macos-app-release/lolabunny-macos-app@${{ env.VERSION }}.dmg
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: .build/lolabunny-macos-app-release/lolabunny-macos-app@${{ env.VERSION }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
