name: Build Release Artifacts

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -B build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-server:
    name: Build Server (${{ matrix.arch }})
    runs-on: macos-15
    needs: test
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: arm64
            swift_triple: arm64-apple-macos12.0
          - arch: x86_64
            swift_triple: x86_64-apple-macos12.0
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [[ -n "$exact_tag" && "$exact_tag" != *+* ]]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            latest_tag="${latest_tag%%+*}"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Build server binary
        run: |
          swift build \
            --package-path app-server \
            --scratch-path build/swiftpm/app-server-${{ matrix.arch }} \
            --configuration release \
            --product lolabunny \
            --triple ${{ matrix.swift_triple }}

      - name: Package binary
        run: |
          rm -rf package-root
          mkdir -p package-root
          bin_dir="$(swift build \
            --package-path app-server \
            --scratch-path build/swiftpm/app-server-${{ matrix.arch }} \
            --configuration release \
            --product lolabunny \
            --triple ${{ matrix.swift_triple }} \
            --show-bin-path)"
          cp "$bin_dir/lolabunny" package-root/lolabunny
          (cd package-root && shasum -a 256 lolabunny > lolabunny.sha256)
          cp .version package-root/.version
          files=(lolabunny lolabunny.sha256 .version)
          if [ -d lola-core ]; then
            cp -R lola-core package-root/
            files+=(lola-core)
          fi
          versioned_archive="lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz"
          tar czf "${versioned_archive}" -C package-root "${files[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolabunny-server-${{ env.VERSION }}-${{ matrix.arch }}
          path: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-app:
    name: Build App (ARM64)
    runs-on: macos-15
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [[ -n "$exact_tag" && "$exact_tag" != *+* ]]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            latest_tag="${latest_tag%%+*}"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != '' && env.MACOS_CERTIFICATE_PWD != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ github.run_id }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Warn when signing secrets are missing
        if: github.ref == 'refs/heads/main'
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [ -z "$CODESIGN_IDENTITY" ] || [ -z "$MACOS_CERTIFICATE" ] || [ -z "$MACOS_CERTIFICATE_PWD" ]; then
            echo "::warning::Signing secrets are missing on main; building an unsigned app artifact."
          fi

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Configure CMake
        run: cmake -B build -DCODESIGN_IDENTITY="${CODESIGN_IDENTITY:--}"
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}

      - name: Build app bundle
        run: cmake --build build --target bundle

      - name: Notarize app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/bundle/Lolabunny.app Lolabunny.zip
          xcrun notarytool submit Lolabunny.zip --apple-id "$APPLE_ID" --password "$APPLE_ID_PWD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple build/bundle/Lolabunny.app
          rm Lolabunny.zip

      - name: Create DMG
        run: cmake --build build --target dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lolabunny-app-${{ env.VERSION }}
          path: build/Lolabunny-${{ env.VERSION }}-arm64.dmg
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: build/Lolabunny-${{ env.VERSION }}-arm64.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
