name: Build Release Artifacts

on:
  push:
    tags: [ "v*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Configure CMake
        run: cmake -B build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-server:
    name: Build Server (${{ matrix.arch }})
    runs-on: macos-15
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            arch: arm64
          - rust_target: x86_64-apple-darwin
            arch: x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: server-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Build server binary
        run: |
          cargo build --release \
            --manifest-path app-server/Cargo.toml \
            --target ${{ matrix.rust_target }} \
            --bin lolabunny

      - name: Package binary
        run: |
          cp target/${{ matrix.rust_target }}/release/lolabunny .
          tar czf "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz" lolabunny
          shasum -a 256 "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz" > "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolabunny-server-${{ env.VERSION }}-${{ matrix.arch }}
          path: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 90

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-app:
    name: Build App (ARM64)
    runs-on: macos-15
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: app-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ github.run_id }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Configure CMake
        run: cmake -B build -DCODESIGN_IDENTITY="${CODESIGN_IDENTITY:--}"
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}

      - name: Build app bundle
        run: cmake --build build --target bundle

      - name: Notarize app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/bundle/Lolabunny.app Lolabunny.zip
          xcrun notarytool submit Lolabunny.zip --apple-id "$APPLE_ID" --password "$APPLE_ID_PWD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple target/bundle/Lolabunny.app
          rm Lolabunny.zip

      - name: Create DMG
        run: cmake --build build --target dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lolabunny-app-${{ env.VERSION }}
          path: Lolabunny-${{ env.VERSION }}-arm64.dmg
          retention-days: 90

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: Lolabunny-${{ env.VERSION }}-arm64.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
