name: Build Release Artifacts

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: build/cargo

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/cargo
          key: test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Configure CMake
        run: cmake -B build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-server:
    name: Build Server (${{ matrix.arch }})
    runs-on: macos-15
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            arch: arm64
          - rust_target: x86_64-apple-darwin
            arch: x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [ -n "$exact_tag" ]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/cargo
          key: server-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Build server binary
        run: |
          cargo build --release \
            --manifest-path app-server/Cargo.toml \
            --target ${{ matrix.rust_target }} \
            --bin lolabunny

      - name: Package binary
        run: |
          cp build/cargo/${{ matrix.rust_target }}/release/lolabunny .
          tar czf "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz" lolabunny
          shasum -a 256 "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz" > "lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolabunny-server-${{ env.VERSION }}-${{ matrix.arch }}
          path: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz
            lolabunny-${{ env.VERSION }}-darwin-${{ matrix.arch }}.tar.gz.sha256
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-app:
    name: Build App (ARM64)
    runs-on: macos-15
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [ -n "$exact_tag" ]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/cargo
          key: app-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ github.run_id }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Validate signing secrets on main
        if: github.ref == 'refs/heads/main'
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          [ -n "$CODESIGN_IDENTITY" ] || { echo "::error::Missing CODESIGN_IDENTITY secret on main"; exit 1; }
          [ -n "$MACOS_CERTIFICATE" ] || { echo "::error::Missing MACOS_CERTIFICATE secret on main"; exit 1; }
          [ -n "$MACOS_CERTIFICATE_PWD" ] || { echo "::error::Missing MACOS_CERTIFICATE_PWD secret on main"; exit 1; }

      - name: Write version file
        run: echo "${{ env.VERSION }}" > .version

      - name: Configure CMake
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            cmake -B build -DCODESIGN_IDENTITY="${CODESIGN_IDENTITY}"
          else
            cmake -B build -DCODESIGN_IDENTITY="${CODESIGN_IDENTITY:--}"
          fi
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}

      - name: Build app bundle
        run: cmake --build build --target bundle

      - name: Notarize app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/bundle/Lolabunny.app Lolabunny.zip
          xcrun notarytool submit Lolabunny.zip --apple-id "$APPLE_ID" --password "$APPLE_ID_PWD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple build/bundle/Lolabunny.app
          rm Lolabunny.zip

      - name: Create DMG
        run: cmake --build build --target dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lolabunny-app-${{ env.VERSION }}
          path: build/Lolabunny-${{ env.VERSION }}-arm64.dmg
          retention-days: 90

      - name: Upload to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: build/Lolabunny-${{ env.VERSION }}-arm64.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-server-delivery-gist:
    name: Publish Server Delivery Gist
    runs-on: macos-15
    needs: build-server
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from nearest tag and commit offset
        run: |
          exact_tag="$(git describe --tags --match "v*" --exact-match 2>/dev/null || true)"
          if [ -n "$exact_tag" ]; then
            latest_tag="$exact_tag"
            offset="0"
            version="$exact_tag"
          else
            latest_tag="$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || true)"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.0.0"
              offset="$(git rev-list --count HEAD)"
            else
              offset="$(git rev-list --count "${latest_tag}..HEAD")"
            fi
            version="${latest_tag}+${offset}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "BASE_TAG=${latest_tag}" >> "$GITHUB_ENV"
          echo "VERSION_OFFSET=${offset}" >> "$GITHUB_ENV"

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lolabunny-server-${{ env.VERSION }}-*
          path: delivery-assets
          merge-multiple: true

      - name: Validate gist secrets
        env:
          GITHUB_GIST_ID: ${{ secrets.GITHUB_GIST_ID }}
          GITHUB_GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
        run: |
          [ -n "$GITHUB_GIST_ID" ] || { echo "::error::Missing GITHUB_GIST_ID secret"; exit 1; }
          [ -n "$GITHUB_GIST_TOKEN" ] || { echo "::error::Missing GITHUB_GIST_TOKEN secret"; exit 1; }

      - name: Publish server files and manifest to gist
        env:
          GITHUB_GIST_ID: ${{ secrets.GITHUB_GIST_ID }}
          GITHUB_GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
          VERSION: ${{ env.VERSION }}
        run: |
          git clone "https://x-access-token:${GITHUB_GIST_TOKEN}@gist.github.com/${GITHUB_GIST_ID}.git" gist-repo
          shopt -s nullglob
          files=(delivery-assets/lolabunny-"${VERSION}"-darwin-*.tar.gz delivery-assets/lolabunny-"${VERSION}"-darwin-*.tar.gz.sha256)
          [ ${#files[@]} -gt 0 ] || { echo "::error::No server archive files found for ${VERSION}"; exit 1; }
          cp -f "${files[@]}" gist-repo/
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          repo = Path("gist-repo")
          manifest_path = repo / "manifest.json"

          manifest = {"latest": version, "releases": []}
          if manifest_path.exists():
              try:
                  existing = json.loads(manifest_path.read_text(encoding="utf-8"))
                  if isinstance(existing, dict):
                      manifest = existing
              except Exception:
                  pass

          assets = sorted([
              p.name for p in repo.glob(f"lolabunny-{version}-darwin-*.tar.gz")
          ] + [
              p.name for p in repo.glob(f"lolabunny-{version}-darwin-*.tar.gz.sha256")
          ])

          releases = manifest.get("releases", [])
          if not isinstance(releases, list):
              releases = []
          normalized = []
          for release in releases:
              if not isinstance(release, dict):
                  continue
              rv = str(release.get("version", "")).strip()
              ra = release.get("assets", [])
              if not rv or not isinstance(ra, list):
                  continue
              if rv == version:
                  continue
              normalized.append({"version": rv, "assets": [str(a).strip() for a in ra if str(a).strip()]})

          normalized.append({"version": version, "assets": assets})
          manifest["latest"] = version
          manifest["releases"] = normalized
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          cd gist-repo
          if [ -z "$(git status --porcelain)" ]; then
            echo "No gist changes to publish"
            exit 0
          fi
          git add .
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Update lolabunny delivery files for ${VERSION}"
          git push
